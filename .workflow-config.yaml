# AI Workflow Automation Configuration
# Project: ibira.js

project:
  name: "ibira.js"
  type: "nodejs-library"
  description: "A JavaScript library for fetching and caching API data with observer pattern support"
  kind: "nodejs_library"
  version: "0.3.1-alpha"

tech_stack:
  primary_language: "javascript"
  build_system: "npm"
  test_framework: "jest"
  test_command: "npm test"
  validate_command: "npm run validate"

structure:
  source_dirs:
    - src
  test_dirs:
    - __tests__
  docs_dirs:
    - docs

workflow:
  smart_execution: true
  parallel_execution: true
  ai_cache_enabled: true
  auto_commit: false
  multi_stage_pipeline: false
  ml_optimize: false

deploy:
  enabled: true
  script: scripts/deploy.sh
  description: "Tag, push, and refresh CDN URLs for ibira.js"
