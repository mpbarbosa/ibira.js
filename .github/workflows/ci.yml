name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docker-test:
    name: Docker test suite (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run test suites in Docker
        run: |
          chmod +x scripts/run-tests-docker.sh
          NODE_VERSION=${{ matrix.node-version }} bash scripts/run-tests-docker.sh --no-cleanup
